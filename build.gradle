import com.google.gson.Gson
import com.google.gson.GsonBuilder
import com.google.gson.JsonArray
import com.google.gson.JsonObject
import com.google.gson.JsonParser

import java.nio.file.Files
import java.util.jar.JarEntry

plugins {
    id 'java'
    id 'fabric-loom' version '1.11-SNAPSHOT'
    // id 'fabric-loom' version '1.16-SNAPSHOT'
    id 'com.github.gmazzo.buildconfig' version '5.3.5'
    id 'io.franzbecker.gradle-lombok' version '5.0.0'
    id 'com.gradleup.shadow' version '9.0.0-beta4'
}

base {
    archivesName = project.archives_base_name
}
version = project.mod_version
group = project.maven_group

buildConfig {
    buildConfigField(String, "HASH", "${execute("git rev-parse --short HEAD")}")
    buildConfigField(String, "VERSION", project.mod_version)
    buildConfigField(String, "BUILD_NUMBER", project.build_number)
    buildConfigField(String, "BUILD_IDENTIFIER", project.build_identifier)
    buildConfigField(String, "BUILD_TIME", "${new Date(System.currentTimeMillis()).format("MM/dd/yyyy HH:mm")}")

    packageName "net.shoreline.client"
    useJavaOutput()
    generateAtSync = true
    documentation.set("Generated by BuildConfig plugin")
}

sourceSets.main.java.srcDirs += "build/gen/buildconfig/src/main"

loom {
    accessWidenerPath = file("src/main/resources/shoreline.accesswidener")
}

repositories {
    mavenCentral()
    maven { url = uri("https://jitpack.io") }
    maven { url = uri("https://impactdevelopment.github.io/maven/") }
    maven {
        name = "modrinth"
        url = "https://api.modrinth.com/maven"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_version}:v2"

    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation("net.fabricmc.fabric-api:fabric-api:${project.fabric_version}") {
        exclude group: "net.fabricmc.fabric-api", module: "fabric-loot-api-v3"
        exclude group: "net.fabricmc.fabric-api", module: "fabric-loot-api-v2"
    }
    modImplementation "cabaletta:baritone-api:${project.baritone_api_version}"
    modImplementation "maven.modrinth:sodium:${project.sodium_version}"

    implementation platform("org.lwjgl:lwjgl-bom:3.3.3")
    implementation "org.lwjgl:lwjgl-harfbuzz:3.3.3"
    implementation "org.lwjgl:lwjgl-freetype"
    runtimeOnly "org.lwjgl:lwjgl-harfbuzz:3.3.3:natives-macos-arm64"
    runtimeOnly "org.lwjgl:lwjgl-freetype:3.3.3:natives-macos-arm64"
    runtimeOnly "org.lwjgl:lwjgl-harfbuzz:3.3.3:natives-windows"
    runtimeOnly "org.lwjgl:lwjgl-freetype:3.3.3:natives-windows"

    compileOnly("org.projectlombok:lombok:1.18.38")
    annotationProcessor("org.projectlombok:lombok:1.18.38")

    testCompileOnly("org.projectlombok:lombok:1.18.38")
    testAnnotationProcessor("org.projectlombok:lombok:1.18.38")

    testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    // Minecraft 1.18 (1.18-pre2) upwards uses Java 17.
    it.options.release = 21

    // Make this run before the compileJava task
    dependsOn generateBuildConfig
}

shadowJar {
    configurations = [project.configurations.shadow]
    archiveClassifier.set("dev")
}

remapJar {
    dependsOn(shadowJar)
    inputFile = tasks.shadowJar.archiveFile
}

jar {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.register('buildClientOnly') {
    doFirst {
        tasks.remapLoader.enabled = false
    }
    finalizedBy 'build'
}

def execute(String cmd) {
    try {
        final def stdout = new ByteArrayOutputStream()

        exec {
            commandLine cmd.split(" ")
            standardOutput = stdout
        }

        return stdout.toString().trim()
    } catch (ignored) {
        return null
    }
}